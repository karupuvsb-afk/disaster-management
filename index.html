<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIH1527 - Disaster Management System</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    
    <style>
        #map { 
            height: 350px; 
            width: 90%; 
            max-width: 800px;
            margin: 20px auto;
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1;
        }
        .map-section { padding: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>Disaster Management System</h1>
        <p id="location-display">Searching for GPS signal...</p>
    </header>

    <main>
        <section class="sos-box">
            <button id="sos-btn">SEND SOS</button>
            <p><strong>Immediate Assistance Required?</strong> Click above.</p>
        </section>

        <section class="map-section">
            <h2>Disaster Impact Map</h2>
            <div id="map"></div>
        </section>

        <section class="report-form">
            <h2>Report a Disaster</h2>
            <form id="disaster-form">
                <select id="disaster-type" required>
                    <option value="">Select Disaster Type</option>
                    <option value="Flood">🌊 Flood</option>
                    <option value="Fire">🔥 Fire</option>
                    <option value="Earthquake">🌋 Earthquake</option>
                    <option value="Medical">🚑 Medical Emergency</option>
                </select>
                <textarea id="description" placeholder="Describe the situation (e.g., water level rising, building fire)..." required></textarea>
                <button type="submit">Submit Official Report</button>
            </form>
        </section>

        <section class="alerts">
            <h2>Live Verified Alerts</h2>
            <div id="alert-list">
                </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="script.js"></script>
</body>
</html>
